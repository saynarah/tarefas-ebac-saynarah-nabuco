name: category-meme-service

services:
  mysql:
    container_name: 'mysql-category-meme-service'
    image: 'mysql:8.4.7'
    environment:
      - 'MYSQL_DATABASE=category-meme-service'
      - 'MYSQL_PASSWORD=secret'
      - 'MYSQL_ROOT_PASSWORD=secret'
      - 'MYSQL_USER=myuser'
    ports:
      - '3307:3306'
